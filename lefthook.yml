commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    build:
      run: bun nx run-many -t build -p @org/frontend,@org/backend

pre-commit:
  parallel: true
  commands:
    prettier:
      priority: 1
      glob: '*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml,css}'
      exclude: 'bun.lock'
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    nx-verify:
      priority: 2
      run: bun nx sync:check && bun nx run-many -t typecheck -p @org/frontend,@org/backend --parallel=2
    cspell:
      priority: 2
      glob: '*.{ts,tsx,js,mjs,cjs,md,json,yml,yaml}'
      exclude: 'bun.lock'
      run: bunx cspell --cache --no-must-find-files lint {staged_files}
    knip:
      priority: 2
      glob: '*.{ts,tsx,js,jsx,json}'
      run: bun knip
